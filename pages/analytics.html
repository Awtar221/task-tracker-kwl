<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Analytics</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

<div class="app-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Subtrack</div>
      <div class="logo-sub">Subscription Tracker</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="../index.html" class="nav-item">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="subscriptions.html" class="nav-item">
        <i class="ti ti-list"></i>
        <span>My Subscriptions</span>
      </a>
      <a href="analytics.html" class="nav-item active">
        <i class="ti ti-chart-bar"></i>
        <span>Analytics</span>
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar"></div>
        <div class="user-info">
          <div class="user-name"></div>
          <div class="user-role">Free plan</div>
        </div>
        <i class="ti ti-logout settings-icon" id="logoutBtn" title="Logout"></i>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-area">
    <header class="topbar">
      <h1 class="page-title">Analytics</h1>
    </header>

    <div class="content">
      <!-- Placeholder — charts to be added in Iteration 2 -->
      <div class="empty-state" style="padding-top: 80px;">
        <i class="ti ti-chart-bar" style="font-size:40px;opacity:0.3;display:block;margin-bottom:12px;"></i>
        <p>Coming Soon</p>
      </div>
    </div>
  </main>
</div>

<script src="../js/session.js"></script>

</body>
</html>
