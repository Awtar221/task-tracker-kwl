<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="app-shell">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your account</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" />
    </div>

    <button class="btn-auth" id="loginBtn">Sign in</button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div id="loginMessage"></div>
  </div>
</div>

<script>
  const loginBtn = document.getElementById('loginBtn');
  const msgDiv = document.getElementById('loginMessage');

  loginBtn.addEventListener('click', function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
      msgDiv.innerHTML = '<div class="error-msg">❌ Please enter username and password</div>';
      return;
    }

    const users = JSON.parse(localStorage.getItem('subtrack_users')) || [];
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
      localStorage.setItem('subtrack_current_user', username);
      window.location.href = 'index.html';
    } else {
      msgDiv.innerHTML = '<div class="error-msg">❌ Invalid username or password</div>';
    }
  });
</script>
</body>
</html>
