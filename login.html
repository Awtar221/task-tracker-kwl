<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="app-shell">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your account</div>

    <div class="form-group">
      <label for="loginUsername">Username</label>
      <input type="text" id="loginUsername" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" />
    </div>

    <button class="btn-auth" id="loginBtn">Sign in</button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

    <!-- Feedback message injected by auth.js -->
    <div id="loginMessage"></div>
  </div>
</div>

<!-- auth.js handles both login and register logic -->
<script src="js/auth.js"></script>

</body>
</html>
