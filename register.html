<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="app-shell">
  <div class="auth-card">
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Start tracking your subscriptions</div>

    <div class="form-group">
      <label for="regUsername">Username</label>
      <input type="text" id="regUsername" placeholder="e.g. alexchen" />
    </div>

    <div class="form-group">
      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" placeholder="At least 3 characters" />
    </div>

    <div class="form-group">
      <label for="regConfirm">Confirm password</label>
      <input type="password" id="regConfirm" placeholder="Enter password again" />
    </div>

    <button class="btn-auth" id="registerBtn">Register</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

    <!-- Feedback message injected by auth.js -->
    <div id="regMessage"></div>
  </div>
</div>

<!-- auth.js handles both login and register logic -->
<script src="js/auth.js"></script>

</body>
</html>
